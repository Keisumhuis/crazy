# 这是一个测试配置文件
; 注释可以用#或;开头

# 全局配置（没有section的默认配置）
default_timeout = 10
cache_size = 256

[database]
# 数据库配置
host = 127.0.0.1
port = 3306
username = admin
password = "secret123"  ; 带引号的字符串
database = test_db
max_connections = 100
timeout = 30.5
ssl_enabled = true

[server]
; 服务器配置
host = 0.0.0.0
port = 8080
debug_mode = false
log_level = info
max_workers = 8

[network]
timeout = 60
retry_count = 3
proxy_enabled = yes
buffer_size = 1024

[paths]
log_dir = "/var/log/myapp"
data_dir = /opt/data
temp_dir = "C:\Temp\myapp"

[empty_section]

[special_cases]
# 各种边界情况测试
empty_value = 
spaces     =   hello world  
mixed_spaces =  test   value  
only_equals = ===
comment_after_value = actual_value  # 这是注释
quoted_with_spaces = "  quoted value  "
single_quoted = 'single quoted'

[client_actor]
address = "123.57.86.15"
port = 8901
heartbeat_interval = 5000